# Manually triggered workflow to publish a dev build to npm under the `@dev` tag.
#
# How to use:
#   1. Go to Actions → "Publish Dev Build" → "Run workflow" (select master branch).
#   2. The build, lint, unit tests, and integration tests run automatically.
#   3. Once they pass, the `dev-publish` job enters a pending-approval state.
#   4. A required reviewer (arturovt or markwhitfeld) approves in the
#      "npm-publish-dev" GitHub environment, and the publish step runs.
#
# Prerequisites (one-time repo setup):
#   - Create a GitHub Environment named `npm-publish-dev` under
#     Settings → Environments, with arturovt and markwhitfeld as required reviewers.
#   - Add NPM_TOKEN as a secret on that environment (or as a repo secret).

name: Publish Dev Build

on:
  workflow_dispatch:

env:
  NODE_VERSION: 22.x

defaults:
  run:
    shell: bash

jobs:
  dev-build:
    if: github.ref == 'refs/heads/master' && github.repository_owner == 'ngxs'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Build NGXS
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ngxs-build
          path: ./@ngxs
          retention-days: 1

  dev-test:
    if: github.ref == 'refs/heads/master' && github.repository_owner == 'ngxs'
    runs-on: ubuntu-latest
    needs: dev-build

    strategy:
      matrix:
        script: [lint, 'test']

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Run ${{ matrix.script }}
        run: yarn nx run-many --target=${{ matrix.script }} --configuration=ci --all

  dev-integration-test:
    if: github.ref == 'refs/heads/master' && github.repository_owner == 'ngxs'
    runs-on: ubuntu-latest
    needs: dev-build

    strategy:
      matrix:
        script:
          - 'integration:ng21'
          - 'test:types'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Run ${{ matrix.script }}
        run: yarn ${{ matrix.script }}

  dev-publish:
    if: github.ref == 'refs/heads/master' && github.repository_owner == 'ngxs'
    runs-on: ubuntu-latest
    environment: npm-publish-dev
    needs: [dev-build, dev-test, dev-integration-test]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          github-ref-name: ${{ github.ref_name }}
          github-sha: ${{ github.sha }}

      - name: Check @ngxs build artifacts
        uses: ./.github/actions/check-build-artifacts

      - name: Development release - publish dev builds to all @ngxs packages
        run: yarn publish:dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
